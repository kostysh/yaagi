services:
  postgres:
    ports:
      - "${YAAGI_SMOKE_POSTGRES_HOST_PORT:-15432}:5432"
    mem_limit: "${YAAGI_SMOKE_POSTGRES_MEMORY_LIMIT:-768m}"
    memswap_limit: "${YAAGI_SMOKE_POSTGRES_MEMORY_SWAP_LIMIT:-768m}"
    cpus: "${YAAGI_SMOKE_POSTGRES_CPUS:-1.00}"
    pids_limit: 256
    networks:
      - core_net
      - db_net

  vllm-fast:
    environment:
      VLLM_FAST_SERVING_MAX_MODEL_LEN: "${YAAGI_SMOKE_VLLM_FAST_MAX_MODEL_LEN:-4096}"
      VLLM_FAST_SERVING_GPU_MEMORY_UTILIZATION: "${YAAGI_SMOKE_VLLM_FAST_GPU_MEMORY_UTILIZATION:-0.35}"
      VLLM_FAST_SERVING_MAX_NUM_SEQS: "${YAAGI_SMOKE_VLLM_FAST_MAX_NUM_SEQS:-1}"
      VLLM_FAST_SERVING_ENFORCE_EAGER: "${YAAGI_SMOKE_VLLM_FAST_ENFORCE_EAGER:-true}"
    mem_limit: "${YAAGI_SMOKE_VLLM_FAST_MEMORY_LIMIT:-20g}"
    memswap_limit: "${YAAGI_SMOKE_VLLM_FAST_MEMORY_SWAP_LIMIT:-20g}"
    cpus: "${YAAGI_SMOKE_VLLM_FAST_CPUS:-6.00}"
    pids_limit: 512

  core:
    mem_limit: "${YAAGI_SMOKE_CORE_MEMORY_LIMIT:-1g}"
    memswap_limit: "${YAAGI_SMOKE_CORE_MEMORY_SWAP_LIMIT:-1g}"
    cpus: "${YAAGI_SMOKE_CORE_CPUS:-2.00}"
    pids_limit: 512
